<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Logo 11 — the S hears the wave · 1024×1024</title>
<style>
@font-face{font-family:'Clash';src:url('../../assets/fonts/ClashDisplay-600.woff2') format('woff2');font-weight:600}
html,body{margin:0;width:1024px;height:1024px;overflow:hidden}
body{background:radial-gradient(75% 75% at 50% 42%, #1a2029 0%, #0f1216 70%, #0b0e12 100%);position:relative}
.s{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
   font:600 940px/1024px 'Clash';color:#f0a43c;transform:translateY(-14px)}
svg{position:absolute;inset:0}
</style></head>
<body>
<!-- The current logo's signal wave, running behind the new heavy S:
     the machine and the stream it listens to, one mark. -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" aria-hidden="true">
  <path d="M-40 512 C 80 400, 200 400, 320 512 S 560 624, 680 512 S 920 400, 1064 512"
        stroke="#ece5d6" stroke-width="16" opacity=".7"/>
</svg>
<div class="s">S</div>
</body>
</html>
