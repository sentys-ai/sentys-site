<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Logo 4 — nodal tile · screenshot 1024×1024</title>
<style>html,body{margin:0;width:1024px;height:1024px;overflow:hidden;background:#0f1216}
canvas{display:block;width:1024px;height:1024px}</style></head>
<body>
<!-- The hero's own physics as the mark: Chladni dust, one lobe heating. -->
<canvas id="c" width="1024" height="1024"></canvas>
<script>
const cv = document.getElementById('c'), x = cv.getContext('2d');
const S = 1024, r = 1;
const tile = () => { x.beginPath();
  x.moveTo(r,0); x.arcTo(S,0,S,S,r); x.arcTo(S,S,0,S,r); x.arcTo(0,S,0,0,r); x.arcTo(0,0,S,0,r);
  x.closePath(); };
// background
tile(); x.save(); x.clip();
const g = x.createRadialGradient(S*.5,S*.42,0,S*.5,S*.42,S*.75);
g.addColorStop(0,'#1a2029'); g.addColorStop(.7,'#0f1216'); g.addColorStop(1,'#0b0e12');
x.fillStyle = g; x.fillRect(0,0,S,S);
x.restore();
// chladni dust, mode 3:2, bands smooth and bold; heat one upper-right lobe
const m=3, n=2, img = x.getImageData(0,0,S,S), d = img.data;
const ch = (px,py) => Math.cos(m*Math.PI*px)*Math.cos(n*Math.PI*py) - Math.cos(n*Math.PI*px)*Math.cos(m*Math.PI*py);
const inTile = (i,j) => {
  const cx = Math.min(Math.max(i, r), S-r), cy = Math.min(Math.max(j, r), S-r);
  return (i-cx)*(i-cx)+(j-cy)*(j-cy) <= r*r || (i>=r&&i<S-r) || (j>=r&&j<S-r);
};
for (let j=0;j<S;j++){
  for (let i=0;i<S;i++){
    if (!inTile(i,j)) continue;
    const px = (i/S - .5)*1.62, py = (j/S - .5)*1.62;
    const c = ch(px,py);
    const dust = Math.max(0, 1 - Math.abs(c)/0.42);
    if (dust <= 0) continue;
    const v = Math.pow(dust, 1.6);
    const heat = Math.min(1, Math.max(0, 1 - Math.hypot(px-.55, py+.42)/.5) * 1.4);
    const k = (j*S+i)*4;
    const dr=236,dg=229,db=214, hr=255,hg=115,hb=72;
    d[k]   = Math.min(255, d[k]   + v*( dr*(1-heat)+hr*heat ));
    d[k+1] = Math.min(255, d[k+1] + v*( dg*(1-heat)+hg*heat ));
    d[k+2] = Math.min(255, d[k+2] + v*( db*(1-heat)+hb*heat ));
  }
}
x.putImageData(img,0,0);
</script>
</body>
</html>
