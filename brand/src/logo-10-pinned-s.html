<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Logo 10 — the pinned S · 1024×1024</title>
<style>
@font-face{font-family:'Clash';src:url('../../assets/fonts/ClashDisplay-600.woff2') format('woff2');font-weight:600}
html,body{margin:0;width:1024px;height:1024px;overflow:hidden}
body{background:radial-gradient(75% 75% at 50% 42%, #1a2029 0%, #0f1216 70%, #0b0e12 100%);position:relative}
.s{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
   font:600 940px/1024px 'Clash';color:#f0a43c;transform:translateY(-14px)}
.node{position:absolute;width:56px;height:56px;border-radius:50%;background:#ece5d6;opacity:.95}
.n1{top:307px;left:747px}
.n2{top:617px;left:197px}
</style></head>
<body>
<!-- Logo-3's story with the wordmark's weight: a standing wave pinned
     between two nodes — but the wave is the heavy S itself. -->
<div class="s">S</div>
<div class="node n1"></div>
<div class="node n2"></div>
</body>
</html>
